version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: farm-sx-db
    environment:
      POSTGRES_USER: farm_user
      POSTGRES_PASSWORD: farm_password
      POSTGRES_DB: farm_sx_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farm_user -d farm_sx_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farm-sx-api
    environment:
      DATABASE_URL: postgresql://farm_user:farm_password@postgres:5432/farm_sx_db
      ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: http://localhost:5173,http://localhost:3000
      SQL_ECHO: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/src:/app/src
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000 --reload

  dashboard:
    image: node:18-alpine
    container_name: farm-sx-dashboard
    working_dir: /app
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./dashboard:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:

networks:
  default:
    name: farm-sx-network

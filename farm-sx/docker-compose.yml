version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: farm-sx-db
    environment:
      POSTGRES_USER: farm_user
      POSTGRES_PASSWORD: farm_password
      POSTGRES_DB: farm_sx_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U farm_user -d farm_sx_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: farm-sx-api
    environment:
      DATABASE_URL: postgresql://farm_user:farm_password@postgres:5432/farm_sx_db
      ENV: production
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CORS_ORIGINS: "*"
      SQL_ECHO: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: always
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: farm-sx-dashboard
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:

networks:
  default:
    name: farm-sx-network
